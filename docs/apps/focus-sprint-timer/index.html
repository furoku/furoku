<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Sprint Timer</title>
  <style>
    :root { color-scheme: light dark; --accent:#ff6b4a; --bg:#fff7f1; --panel:#ffffff; --ink:#222; --muted:#6b625d; --line:#ead9cf; }
    @media (prefers-color-scheme: dark) { :root { --bg:#17120f; --panel:#241c18; --ink:#fff3eb; --muted:#c8b8ad; --line:#47362e; } }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, #ffe0d3, var(--bg) 42%); color:var(--ink); min-height:100vh; display:grid; place-items:center; padding:24px; }
    main { width:min(760px, 100%); background:color-mix(in srgb, var(--panel) 92%, transparent); border:1px solid var(--line); border-radius:28px; padding:28px; box-shadow:0 24px 60px rgba(60,30,15,.14); }
    h1 { margin:0 0 8px; font-size:clamp(28px, 6vw, 46px); letter-spacing:-.04em; }
    .lead { color:var(--muted); margin:0 0 22px; line-height:1.7; }
    .timer { text-align:center; padding:26px; border-radius:24px; background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 13%, transparent), transparent); border:1px solid var(--line); }
    .mode { font-weight:800; color:var(--accent); letter-spacing:.12em; text-transform:uppercase; }
    .clock { font-variant-numeric: tabular-nums; font-size:clamp(72px, 17vw, 138px); font-weight:900; letter-spacing:-.08em; line-height:1; margin:12px 0 18px; }
    .controls, .settings { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    button { border:0; border-radius:999px; padding:12px 18px; font-weight:800; cursor:pointer; color:#fff; background:var(--accent); box-shadow:0 8px 20px rgba(255,107,74,.25); }
    button.secondary { background:#5d6875; }
    button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); box-shadow:none; }
    label { display:grid; gap:6px; color:var(--muted); font-size:13px; font-weight:700; }
    input, textarea { border:1px solid var(--line); border-radius:14px; padding:11px 12px; background:var(--panel); color:var(--ink); font:inherit; }
    input { width:112px; text-align:center; }
    textarea { width:100%; min-height:78px; resize:vertical; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-top:18px; }
    .card { border:1px solid var(--line); border-radius:20px; padding:18px; background:color-mix(in srgb, var(--panel) 82%, transparent); }
    .card h2 { margin:0 0 12px; font-size:18px; }
    ul { padding-left:20px; margin:8px 0 0; color:var(--muted); line-height:1.7; }
    .stat { display:flex; justify-content:space-between; border-top:1px solid var(--line); padding-top:10px; margin-top:10px; color:var(--muted); }
    @media (max-width:680px) { main { padding:18px; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>Focus Sprint Timer</h1>
    <p class="lead">今日の作業を「短い集中スプリント」に分ける、ローカルだけで動くポモドーロタイマーです。完了スプリント数とメモはブラウザに保存されます。</p>
    <section class="timer" aria-label="タイマー">
      <div id="mode" class="mode">Focus</div>
      <div id="clock" class="clock" aria-live="polite">25:00</div>
      <div class="controls">
        <button id="startPause">開始</button>
        <button id="skip" class="secondary">休憩へ</button>
        <button id="reset" class="ghost">リセット</button>
      </div>
    </section>
    <section class="grid">
      <div class="card">
        <h2>時間設定</h2>
        <div class="settings">
          <label>集中（分）<input id="focusMinutes" type="number" min="1" max="90" value="25"></label>
          <label>休憩（分）<input id="breakMinutes" type="number" min="1" max="30" value="5"></label>
        </div>
        <div class="stat"><span>今日の完了スプリント</span><strong id="doneCount">0</strong></div>
        <button id="clearStats" class="ghost" style="margin-top:12px">今日の記録をクリア</button>
      </div>
      <div class="card">
        <h2>今回の集中メモ</h2>
        <textarea id="memo" placeholder="例: 企画メモを10分で整理する"></textarea>
        <ul id="history"></ul>
      </div>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const key = 'focus-sprint-timer-v1';
    const today = new Date().toISOString().slice(0,10);
    let state = load();
    let remaining = state.remaining || state.focusMinutes * 60;
    let mode = state.mode || 'focus';
    let running = false;
    let interval = null;

    function load() {
      const fallback = { date: today, focusMinutes:25, breakMinutes:5, done:0, memos:[], remaining:25*60, mode:'focus' };
      try {
        const saved = JSON.parse(localStorage.getItem(key) || 'null');
        if (!saved || saved.date !== today) return fallback;
        return { ...fallback, ...saved };
      } catch { return fallback; }
    }
    function save() { localStorage.setItem(key, JSON.stringify({ ...state, remaining, mode, date: today })); }
    function clampMinutes(value, min, max, fallback) { const n = Number(value); return Number.isFinite(n) ? Math.min(max, Math.max(min, Math.round(n))) : fallback; }
    function format(sec) { const m = Math.floor(sec/60); const s = sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
    function currentDuration() { return (mode === 'focus' ? state.focusMinutes : state.breakMinutes) * 60; }
    function render() {
      $('mode').textContent = mode === 'focus' ? 'Focus' : 'Break';
      $('clock').textContent = format(remaining);
      $('startPause').textContent = running ? '一時停止' : '開始';
      $('skip').textContent = mode === 'focus' ? '休憩へ' : '集中へ';
      $('focusMinutes').value = state.focusMinutes;
      $('breakMinutes').value = state.breakMinutes;
      $('doneCount').textContent = state.done;
      $('memo').value = state.memo || '';
      $('history').innerHTML = state.memos.slice(-5).reverse().map(m => `<li>${escapeHtml(m)}</li>`).join('');
      document.title = `${format(remaining)} - Focus Sprint Timer`;
    }
    function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    function switchMode(nextMode) {
      if (mode === 'focus' && nextMode === 'break') {
        state.done += 1;
        const memo = (state.memo || '').trim();
        if (memo) state.memos.push(`${new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})} 完了: ${memo}`);
        state.memo = '';
      }
      mode = nextMode;
      remaining = currentDuration();
      save(); render();
    }
    function tick() {
      remaining -= 1;
      if (remaining <= 0) switchMode(mode === 'focus' ? 'break' : 'focus');
      save(); render();
    }
    $('startPause').addEventListener('click', () => {
      running = !running;
      if (running) interval = setInterval(tick, 1000); else clearInterval(interval);
      render();
    });
    $('skip').addEventListener('click', () => switchMode(mode === 'focus' ? 'break' : 'focus'));
    $('reset').addEventListener('click', () => { running=false; clearInterval(interval); remaining=currentDuration(); save(); render(); });
    $('focusMinutes').addEventListener('change', e => { state.focusMinutes = clampMinutes(e.target.value, 1, 90, 25); if(mode==='focus') remaining=state.focusMinutes*60; save(); render(); });
    $('breakMinutes').addEventListener('change', e => { state.breakMinutes = clampMinutes(e.target.value, 1, 30, 5); if(mode==='break') remaining=state.breakMinutes*60; save(); render(); });
    $('memo').addEventListener('input', e => { state.memo = e.target.value; save(); });
    $('clearStats').addEventListener('click', () => { state.done=0; state.memos=[]; state.memo=''; save(); render(); });
    render();
  </script>
</body>
</html>
